<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Clair Obscur: Expedition 33 — Tracker</title>
  <meta name="theme-color" content="#0c0a13">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── HOME VIEW ─────────────────────────────────────────────── -->
<div id="view-home" class="view">

  <!-- Hero header with background image -->
  <div class="home-hero">
    <div class="home-hero-overlay"></div>
    <div class="home-hero-content">
      <div class="home-title">Clair Obscur</div>
      <div class="home-subtitle">Expedition 33 · Tracker</div>
      <div class="home-progress-wrap">
        <div class="home-progress-track">
          <div class="home-progress-fill" id="home-overall-fill"></div>
        </div>
        <div class="home-progress-pct" id="home-overall-pct">0%</div>
      </div>
      <div class="home-progress-label" id="home-overall-label">0 / 0 completed</div>
    </div>
  </div>

  <!-- Category list -->
  <div class="home-categories" id="home-categories">
    <!-- Populated by JS -->
  </div>

</div>

<!-- ── CATEGORY VIEW ──────────────────────────────────────────── -->
<div id="view-category" class="view hidden">

  <!-- Compact header -->
  <header class="cat-header" id="cat-header">
    <button class="cat-back-btn" id="btn-back" aria-label="Back to categories">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="cat-header-title" id="cat-header-title">Category</div>
    <div class="cat-header-actions">
      <button class="icon-btn" id="btn-filter" aria-label="Filter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
        </svg>
      </button>
      <button class="icon-btn" id="btn-export" aria-label="Export">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Filter panel -->
  <div class="filter-panel" id="filter-panel">
    <div class="filter-group">
      <div class="filter-label">Status</div>
      <div class="filter-pills">
        <button class="pill active" data-filter="status" data-value="all">All</button>
        <button class="pill" data-filter="status" data-value="remaining">Remaining</button>
        <button class="pill" data-filter="status" data-value="done">Done</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Show</div>
      <div class="filter-pills">
        <button class="pill active" data-filter="missable" data-value="all">All</button>
        <button class="pill" data-filter="missable" data-value="only">⚠ Missable only</button>
      </div>
    </div>
  </div>

  <!-- Category section content -->
  <div class="cat-scroll" id="cat-scroll">
    <!-- Populated by JS -->
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
